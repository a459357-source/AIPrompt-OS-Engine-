<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Prompt OS Galgame</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
h1{font-size:1.6em;color:#58a6ff;margin-bottom:8px}
.status{color:#8b949e;font-size:0.95em;margin-top:16px}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid #21262d;border-top-color:#58a6ff;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.progress{width:200px;height:3px;background:#21262d;border-radius:2px;margin:16px auto;overflow:hidden}
.progress-bar{height:100%;background:#58a6ff;width:0;transition:width 0.3s}
.btn{display:none;margin-top:20px;padding:8px 24px;background:#1c2333;border:1px solid #58a6ff;border-radius:6px;color:#58a6ff;font-size:0.9em;cursor:pointer;text-decoration:none}
.btn:hover{background:#1a3a5c}
.error{color:#f85149;font-size:0.85em;margin-top:8px;display:none}
</style>
</head>
<body>
<h1>🎮 Prompt OS Galgame</h1>
<p style="color:#484f58;font-size:0.85em">AI 互动叙事引擎</p>
<div class="spinner" id="spinner"></div>
<div class="status" id="status">正在启动服务器…</div>
<div class="progress"><div class="progress-bar" id="bar"></div></div>
<div class="error" id="error"></div>
<button class="btn" id="retryBtn" onclick="location.reload()">🔄 重试</button>
<button class="btn" id="enterBtn" onclick="location.href='http://127.0.0.1:8000/'">🚀 进入游戏</button>

<script>
var serverUrl = 'http://127.0.0.1:8000';
var attempts = 0, maxAttempts = 30;
var bar = document.getElementById('bar'), statusEl = document.getElementById('status');
var errorEl = document.getElementById('error'), spinner = document.getElementById('spinner');
var retryBtn = document.getElementById('retryBtn'), enterBtn = document.getElementById('enterBtn');

function check(){
    attempts++;
    var pct = Math.min(100, Math.round(attempts / maxAttempts * 100));
    bar.style.width = pct + '%';
    fetch(serverUrl + '/health')
        .then(function(r){
            if(r.ok){
                statusEl.textContent = '服务器就绪，正在进入…';
                statusEl.style.color = '#7ee787';
                spinner.style.display = 'none';
                bar.style.background = '#7ee787';
                setTimeout(function(){ location.href = serverUrl + '/'; }, 500);
            }
        })
        .catch(function(){
            if(attempts >= maxAttempts){
                statusEl.textContent = '启动超时，请检查 Python 和依赖是否安装';
                statusEl.style.color = '#f85149';
                spinner.style.display = 'none';
                errorEl.textContent = '提示：运行 启动.bat 查看详细错误日志';
                errorEl.style.display = 'block';
                retryBtn.style.display = 'inline-block';
                return;
            }
            statusEl.textContent = '等待服务器启动… (' + attempts + '/' + maxAttempts + ')';
            setTimeout(check, 1000);
        });
}
check();
</script>
</body>
</html>
