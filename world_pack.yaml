world:
  title: 世纪末的棋局：泡沫帝国的逆袭
  genre: 商战 / 重生 / 女性主角 / 历史架空 / 策略
  era: 故事开端
  setting: 1985年，日本泡沫经济前夕。华族西园寺家濒临破产，大小姐皋月携前世对冲基金经理的记忆重生。她以金融为武器，在广场协议、泡沫膨胀与崩溃中建立横跨多产业的帝国，最终对抗操控全球经济的华尔街幕后势力。世界处于历史转折点，每一步都关乎国运与人性。
  main_goal: 击溃华尔街金融霸权，重塑全球经济秩序。
  factions: []
  locations:
  - name: 京都西园寺邸，和式客厅内债主云集，皋月跪坐于祖父遗像前，面前摊开负债清单与一张日元兑美元走势图。
    desc: 初始场景
  tone: 聚焦人物情感与选择
  themes: []
  characters:
  - name: 西园寺皋月
    is_main: true
    role_tags:
    - 西园寺家大小姐
    - 对冲基金天才
    - 重生者
    personality_tags:
    - 冷静果断
    - 城府极深
    - 外冷内热
    - 野心勃勃
    appearance: 黑色长发束成高马尾，琥珀色眼眸锐利如鹰，常穿改良和服或干练西装。
    relationship:
    - 自身
    goal: 建立独立于西方的金融帝国，揭露并摧毁华尔街的全球操控网络。
    secret: 前世被华尔街同僚背叛致死，内心对信任极度戒备。
    background: 前世为华尔街顶级对冲基金经理，因拒绝做空中国新能源产业被陷害身亡。重生为1985年日本华族大小姐，背负300亿日元债务。
    special_ability: 完美记忆与前瞻视野：能清晰回忆未来30年经济事件的所有细节。
  - name: 近卫诚一郎
    is_main: false
    role_tags:
    - 旧财阀近卫家继承人
    - 政府金融顾问
    personality_tags:
    - 傲慢自负
    - 传统守旧
    - 精明算计
    - 内心脆弱
    appearance: 金丝眼镜，一丝不苟的三件套西装，发型永远梳得油亮。
    relationship:
    - 商业对手
    - 潜在合作者
    goal: 维护旧财阀体系，阻止皋月破坏传统秩序，同时暗中觊觎西园寺家遗产。
    secret: 近卫家实际已被华尔街资本控制，他本人是双重间谍。
    background: 京都旧财阀嫡子，毕业于东京大学经济学部，表面温文尔雅实则心狠手辣。
    special_ability: 无
  - name: 卡洛琳·福斯特
    is_main: false
    role_tags:
    - 华尔街代表
    - 高盛合伙人
    personality_tags:
    - 优雅冷酷
    - 笑里藏刀
    - 极端理性
    - 控制欲强
    appearance: 金色大波浪卷发，宝石蓝眼眸，总是穿着香奈儿套装，手持长烟嘴。
    relationship:
    - 终极敌人
    goal: 维持美元霸权，扼杀任何挑战华尔街秩序的力量，特别是皋月。
    secret: 她曾是前世陷害皋月的幕后主使之一，且与近卫家有秘密协议。
    background: 出身纽约银行世家，哈佛MBA，三十岁成为高盛最年轻合伙人，精通全球金融操控。
    special_ability: 无
  relationship_system:
    stages:
    - 疏远
    - 试探
    - 合作
    - 竞争
    - 同盟
    - 羁绊
    - 命运
    affection: 0
